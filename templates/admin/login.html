{% extends "base.html" %}
{% block title %}Connexion Admin — drmbvs{% endblock %}

{% block content %}
<main class="main-content flex items-center" style="justify-content: center; min-height: 80vh;">
  <div class="card fade-in" style="max-width: 400px; width: 100%; padding: 3rem;">

    <div style="text-align: center; margin-bottom: 2.5rem;">
      <div class="logo-icon" style="margin: 0 auto 1rem; width: 60px; height: 60px; font-size: 2rem;">🥁</div>
      <h1 style="font-size: 1.5rem; font-weight: 800; letter-spacing: -1px;">drm<span class="highlight">bvs</span> Admin</h1>
      <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.5rem;">Espace de gestion sécurisé</p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label>Identifiant</label>
        <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%;">Connexion</button>
    </form>

    <div style="text-align: center; margin-top: 2rem;">
      <a href="{{ url_for('index') }}" style="font-size: 0.8rem; color: var(--text-muted);">← Retour au site</a>
    </div>
  </div>
</main>
{% endblock %}
